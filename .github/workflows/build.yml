name: Build Core APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: دریافت کد
      uses: actions/checkout@v4

    - name: نصب JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: دادن مجوز اجرا به gradlew
      run: chmod +x gradlew

    - name: ساخت فقط نسخه Core
      run: ./gradlew assembleCoreDebug --stacktrace

    - name: آپلود نسخه Core
      uses: actions/upload-artifact@v4
      with:
        name: app-core-debug
        path: app/build/outputs/apk/core/debug/app-core-debug.apk
        retention-days: 30
