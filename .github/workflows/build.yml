name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # این گزینه به شما اجازه می‌دهد ساخت را به‌صورت دستی شروع کنید

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: دریافت کد (Checkout)
      uses: actions/checkout@v4

    - name: نصب JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: دادن مجوز اجرا به gradlew
      run: chmod +x gradlew

    - name: ساخت APK دیباگ
      run: ./gradlew assembleDebug --stacktrace

    - name: ذخیره APK ساخته شده (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
